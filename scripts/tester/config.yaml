config:
  absolute_path: /home/guga/Documents/thesis
  repeat: 5
  copy_logs: true
  logs_dir: logs/
  docker_dir: docker/
  results_dir: results/
  copy_target: backup/
  configuration_dir: configuration/
  top_website_path: websites.txt

experiments:
  - name: "control"
    tcpdump: true
    end_test_at: 10
    filesize: "1MiB"
    tor:
      dummy: 0
      jitter: 0
      max_jitter: 10
      min_jitter: 1
      scheduler: "DPVanilla"
    clients:
      bulk_clients: 0
      web_clients: 0
      top_web_clients: 1

