config:
  absolute_path: /home/ubuntu/thesis
  repeat: 1
  copy_logs: true
  logs_dir: logs/
  docker_dir: docker/
  copy_target: backup/
  configuration_dir: configuration/
  top_website_path: mini.websites.txt

experiments:
  ############################
  # KIST Control Experiments #
  ############################
  - name: "control-kist-5Kib-200c"
    end_test_at: 600
    tcpdump_mode: false
    filesize: "5120"
    tor:
      dummy: 0
      max_jitter: 10
      min_jitter: 1
      target_jitter: 2
      dp_distribution: "UNIFORM"
      dp_epsilon: 0.5
      scheduler: "KIST"
    clients:
      bulk_clients: 100
      web_clients: 100
      top_web_clients: 0
