config:
  absolute_path: /home/guga/Documents/thesis
  repeat: 1
  copy_logs: true
  logs_dir: logs/
  docker_dir: docker/
  copy_target: backup/
  configuration_dir: configuration/
  top_website_path: mini.websites.txt

experiments:
  - name: "vanilla-uni0.0-dummy0"
    end_test_at: 60
    tcpdump_mode: false
    filesize: "1MB"
    tor:
      dummy: 0
      max_jitter: 10
      min_jitter: 1
      target_jitter: 2
      dp_distribution: "UNIFORM"
      dp_epsilon: 0.0
      scheduler: "DPVanilla"
    clients:
      bulk_clients: 1
      web_clients: 0
      top_web_clients: 0

  - name: "kist-uni0.0-dummy0"
    end_test_at: 60
    tcpdump_mode: false
    filesize: "1MB"
    tor:
      dummy: 50
      max_jitter: 10
      min_jitter: 1
      target_jitter: 2
      dp_distribution: "EXPONENTIAL"
      dp_epsilon: 0.5
      scheduler: "DPKist"
    clients:
      bulk_clients: 1
      web_clients: 0
      top_web_clients: 0

