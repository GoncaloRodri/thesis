config:
  absolute_path: /home/guga/Documents/thesis
  repeat: 10
  copy_logs: true
  logs_dir: logs/
  docker_dir: docker/
  copy_target: backup/
  configuration_dir: configuration/
  top_website_path: mini.websites.txt

experiments:
  - name: "perf-onweb-clean"
    end_test_at: 60
    tcpdump_mode: false
    filesize: "1MiB"
    tor:
      dummy: 0
      jitter: 0
      max_jitter: 10
      min_jitter: 1
      scheduler: "DPVanilla"
    clients:
      bulk_clients: 1
      web_clients: 1
      top_web_clients: 0
  - name: "perf-onweb-dirty"
    end_test_at: 60
    tcpdump_mode: false
    filesize: "1MiB"
    tor:
      dummy: 100
      jitter: 100
      max_jitter: 20
      min_jitter: 1
      scheduler: "DPVanilla"
    clients:
      bulk_clients: 50
      web_clients: 50
      top_web_clients: 0

