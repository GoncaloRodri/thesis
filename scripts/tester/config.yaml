combinations:
  tcpdump: false
  filesize: ["5120"]
  end_test_at: 600
  clients:
    # [Bulk Clients, Web Clients, Top Web Clients]
    - [100, 100, 0]
    - [250, 250, 0]
    - [500, 500, 0]
    - [1000, 1000, 0]
  tor:
    dummy: [0]
    max_jitter: [10]
    min_jitter: [1]
    target_jitter: [2]
    dp_distribution: ["UNIFORM", "NORMAL", "EXPONENTIAL", "LAPLACE", "POISSON"]
    dp_epsilon: [0.1, 0.25, 0.5, 0.75, 1.0]
    scheduler: ["DPKist", "DPVanilla"]